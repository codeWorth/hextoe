<!DOCTYPE html>
<html>
<head>
	<title>HexToe - User</title>
	<link rel="stylesheet" href="/src/hextoe.css">
	<style>
		html, body { height: 100%; }
		body { display: flex; flex-direction: column; }

		.profile-header {
			text-align: center; padding: 32px 32px 8px;
		}
		.profile-username {
			font-size: 32px; font-weight: 700; color: var(--text);
		}
		.profile-actions {
			margin-top: 12px;
		}

		.game-list-wrap {
			flex: 1; display: flex; flex-direction: column; align-items: center;
			padding: 16px 32px 32px; min-height: 0; overflow: hidden;
		}
		.game-list {
			width: 100%; max-width: 600px; flex: 1; background: var(--bg-dark); border-radius: 8px;
			border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
		}
		.game-list-header {
			padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--text-dim);
			border-bottom: 1px solid var(--border);
		}
		.game-list-items { flex: 1; overflow-y: auto; }

		.game-entry {
			display: flex; align-items: center; padding: 10px 14px;
			cursor: pointer; border-bottom: 1px solid var(--border-subtle); font-size: 14px;
		}
		.game-entry:hover { background: var(--border-subtle); }
		.game-entry.selected { background: var(--green-bg); }
		.game-entry .p1 { flex: 1; text-align: left; }
		.game-entry .moves { flex: 0 0 auto; text-align: center; color: var(--text-dim); font-size: 12px; padding: 0 8px; }
		.game-entry .p2 { flex: 1; text-align: right; }
		.game-entry .winner { color: var(--green); }
		.game-entry .draw { color: var(--text-placeholder); }
	</style>
</head>
<body>
	<div class="header">
		<h1 onclick="window.location.href='/'">HexToe</h1>
		<div class="header-right" id="header-right"></div>
	</div>
	<div class="profile-header">
		<div class="profile-username" id="profile-username">Loading...</div>
		<div class="profile-actions" id="profile-actions"></div>
	</div>
	<div class="game-list-wrap">
		<div class="game-list">
			<div class="game-list-header">Games</div>
			<div class="game-list-items" id="game-list-items"></div>
		</div>
	</div>

<script src="/src/util.js"></script>
<script>
const pathParts = window.location.pathname.split("/");
const profileUserId = pathParts[pathParts.length - 1];

const usernameEl = document.getElementById("profile-username");
const actionsEl = document.getElementById("profile-actions");
const gameListEl = document.getElementById("game-list-items");

let _username = null;
let _games = [];
let _selectedGameId = null;

function renderProfile() {
	if (!_username) {
		usernameEl.textContent = "User not found";
		return;
	}
	usernameEl.textContent = _username;

	actionsEl.innerHTML = "";
	if (currentUser && currentUser.user_id === profileUserId) {
		const btn = document.createElement("button");
		btn.className = "btn-secondary btn-small";
		btn.textContent = "Change Login Info";
		btn.onclick = () => { window.location.href = "/changeinfo"; };
		actionsEl.appendChild(btn);
	}
}

function renderGameList() {
	gameListEl.innerHTML = "";
	for (const game of _games) {
		const winnerSide = game.is_complete ? game.winner_index : null;
		const entry = createGameEntry(
			game.game_id, game.p1_uname, game.p2_uname, game.total_moves, winnerSide,
			{ selected: game.game_id === _selectedGameId }
		);
		entry.onclick = () => {
			_selectedGameId = game.game_id;
			renderGameList();
			window.location.href = "/game/" + game.game_id;
		};
		gameListEl.appendChild(entry);
	}
}

async function init() {
	await loadCurrentUser();
	renderHeader();

	const r = await api("GET", "/api/user/" + profileUserId);
	if (r.status === 200) {
		_username = r.data.username;
	}
	renderProfile();

	const g = await api("GET", "/api/user/" + profileUserId + "/games");
	if (g.status === 200) {
		_games = g.data.games;
	}
	renderGameList();
}
init();
</script>
</body>
</html>
