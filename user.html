<!DOCTYPE html>
<html>
<head>
	<title>HexToe - User</title>
	<link rel="stylesheet" href="/src/hextoe.css">
	<style>
		html, body { height: 100%; }
		body { display: flex; flex-direction: column; }

		.profile-header {
			text-align: center; padding: 32px 32px 8px;
		}
		.profile-username {
			font-size: 32px; font-weight: 700; color: var(--text);
		}
		.profile-actions {
			margin-top: 12px; display: flex; gap: 10px; justify-content: center;
		}
		.btn-danger {
			background: #5a2a2a; color: #daa; padding: 6px 16px; font-size: 14px;
		}
		.btn-danger:hover { background: #6a3a3a; }

		.game-list-wrap {
			flex: 1; display: flex; flex-direction: column; align-items: center;
			padding: 16px 32px 32px; min-height: 0; overflow: hidden;
		}
		.game-list { width: 100%; max-width: 600px; flex: 1; }
	</style>
</head>
<body>
	<div class="header">
		<h1 onclick="window.location.href='/'">HexToe</h1>
		<div class="header-right" id="header-right"></div>
	</div>
	<div class="profile-header">
		<div class="profile-username" id="profile-username">Loading...</div>
		<div class="profile-actions" id="profile-actions"></div>
	</div>
	<div class="game-list-wrap">
		<div class="game-list">
			<div class="game-list-header">Games</div>
			<div class="game-list-items" id="game-list-items"></div>
		</div>
	</div>

<script src="/src/util.js"></script>
<script>
const pathParts = window.location.pathname.split("/");
const profileUserId = pathParts[pathParts.length - 1];

const usernameEl = document.getElementById("profile-username");
const actionsEl = document.getElementById("profile-actions");
const gameListEl = document.getElementById("game-list-items");

let _username = null;
let _games = [];

function renderProfile() {
	if (!_username) {
		usernameEl.textContent = "User not found";
		return;
	}
	usernameEl.textContent = _username;

	actionsEl.innerHTML = "";
	if (currentUser && currentUser.user_id === profileUserId) {
		const btn = document.createElement("button");
		btn.className = "btn-secondary btn-small";
		btn.textContent = "Change Login Info";
		btn.onclick = () => { window.location.href = "/changeinfo"; };
		actionsEl.appendChild(btn);

		const delBtn = document.createElement("button");
		delBtn.className = "btn-danger btn-small";
		delBtn.textContent = "Delete Account";
		delBtn.onclick = async () => {
			if (!confirm("Are you sure you want to delete your account? This cannot be undone.")) return;
			const r = await api("DELETE", "/api/user");
			if (r.status === 204) {
				currentUser = null;
				window.location.href = "/";
			}
		};
		actionsEl.appendChild(delBtn);
	}
}

function addGameEntry(game) {
    const entry = createGameEntry(game);
    gameListEl.appendChild(entry);
}

function renderGameList() {
	gameListEl.innerHTML = "";
	for (const game of _games) {
        if(!game.is_complete) {
            addGameEntry(game);
        }
	}
	for (const game of _games) {
        if(game.is_complete) {
            addGameEntry(game);
        }
	}
}

async function init() {
	await loadCurrentUser();
	renderHeader();

	const r = await api("GET", "/api/user/" + profileUserId);
	if (r.status === 200) {
		_username = r.data.username;
	}
	renderProfile();

	const g = await api("GET", "/api/user/" + profileUserId + "/games");
	if (g.status === 200 && Array.isArray(g.data.games)) {
		_games = g.data.games;
	}
	renderGameList();
}
init();
</script>
</body>
</html>
