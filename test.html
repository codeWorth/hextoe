<!DOCTYPE html>
<html>
<head>
	<title>HexToe API Tests</title>
	<style>
		body { font-family: monospace; white-space: pre-wrap; padding: 20px; background: #1a1a1a; color: #ccc; }
		.pass { color: #4caf50; }
		.fail { color: #f44336; }
		.info { color: #64b5f6; }
		.section { color: #ffa726; font-weight: bold; margin-top: 10px; }
	</style>
</head>
<body>
<div id="out"></div>
<script>
const BASE = "http://localhost:8000";
const out = document.getElementById("out");

function log(msg, cls = "") {
	const el = document.createElement("div");
	el.className = cls;
	el.textContent = msg;
	out.appendChild(el);
}

function pass(msg) { log("  PASS: " + msg, "pass"); }
function fail(msg) { log("  FAIL: " + msg, "fail"); }
function info(msg) { log("  " + msg, "info"); }
function section(msg) { log("\n=== " + msg + " ===", "section"); }

function assert(cond, msg) {
	if (cond) pass(msg);
	else fail(msg);
	return cond;
}

function assertStatus(actual, expected, msg) {
	if (actual === expected) {
		pass(msg + " (status " + actual + ")");
	} else {
		fail(msg + " | expected status: " + expected + " | got: " + actual);
	}
	return actual === expected;
}

function assertEq(actual, expected, msg) {
	if (JSON.stringify(actual) === JSON.stringify(expected)) {
		pass(msg);
		return true;
	} else {
		fail(msg + " | expected: " + JSON.stringify(expected) + " | got: " + JSON.stringify(actual));
		return false;
	}
}

async function request(method, path, { body, session } = {}) {
	const opts = { method, headers: {} };
	if (body !== undefined) {
		opts.headers["Content-Type"] = "application/json";
		opts.body = JSON.stringify(body);
	}
	if (session) {
		opts.headers["session-id"] = session;
	}
	const resp = await fetch(BASE + path, opts);
	let data = null;
	const text = await resp.text();
	try { data = JSON.parse(text); } catch { data = text; }
	return { status: resp.status, data };
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Generate unique usernames to avoid conflicts across test runs
const suffix = Date.now().toString(36);
const USER1 = "testuser1_" + suffix;
const USER2 = "testuser2_" + suffix;
const PASSWORD = "testpass123";

async function runTests() {
	let session1, session2, userId1, userId2;

	// =====================
	// USER ENDPOINTS
	// =====================
	section("POST /user - Create users");

	let r = await request("POST", "/user", { body: { username: USER1, password: PASSWORD } });
	assertStatus(r.status, 200, "Create user1");
	assert(typeof r.data === "string" && r.data.length > 0, "Returns session id string");
	session1 = r.data;
	info("user1 session: " + session1.slice(0, 16) + "...");

	r = await request("POST", "/user", { body: { username: USER2, password: PASSWORD } });
	assertStatus(r.status, 200, "Create user2");
	session2 = r.data;
	info("user2 session: " + session2.slice(0, 16) + "...");

	// Duplicate username
	r = await request("POST", "/user", { body: { username: USER1, password: PASSWORD } });
	assertStatus(r.status, 409, "Duplicate username");

	// ---- Login ----
	section("POST /user/login");

	r = await request("POST", "/user/login", { body: { username: USER1, password: PASSWORD } });
	assertStatus(r.status, 200, "Login");
	assert(r.data !== session1, "Login returns a new session id");
	session1 = r.data;

	r = await request("POST", "/user/login", { body: { username: USER1, password: "wrongpass" } });
	assertStatus(r.status, 404, "Bad password");

	// ---- Update user ----
	section("PUT /user - Update user");

	r = await request("PUT", "/user", { body: { username: null, password: null }, session: session1 });
	assertStatus(r.status, 400, "Null username and password");

	const NEW_USER1 = USER1 + "_renamed";
	r = await request("PUT", "/user", { body: { username: NEW_USER1, password: null }, session: session1 });
	assertStatus(r.status, 200, "Update username");
	session1 = r.data;

	// ---- Get user ----
	section("GET /user/:id - Get user profile");

	// We need the user_id. Login again to get fresh session, then we need to figure out
	// the user_id. The API doesn't return user_id directly, so let's use the game
	// endpoints later to discover it. For now, test with a bad id.
	r = await request("GET", "/user/nonexistent_id");
	assertStatus(r.status, 404, "Nonexistent user");

	// ---- Logout ----
	section("POST /user/logout");

	r = await request("POST", "/user/logout", { session: session1 });
	assertStatus(r.status, 204, "Logout");

	// Session should be expired now
    await sleep(500);
	r = await request("POST", "/user/logout", { session: session1 });
	assertStatus(r.status, 403, "Expired session");

	// Re-login to continue tests
	r = await request("POST", "/user/login", { body: { username: NEW_USER1, password: PASSWORD } });
	session1 = r.data;
	info("user1 re-logged in");

	// =====================
	// GAME CREATION - PUBLIC
	// =====================
	section("POST /game/join - Public game");

	r = await request("POST", "/game/join", { session: session1 });
	assertStatus(r.status, 200, "User1 join");
	const publicGameId = r.data;
	info("public game id: " + publicGameId.slice(0, 16) + "...");

	// Same user joining again returns same game
	r = await request("POST", "/game/join", { session: session1 });
	assertStatus(r.status, 200, "User1 join again");
	assertEq(r.data, publicGameId, "Returns same game id for user already in a public game");

	// User2 joins and should be matched
	r = await request("POST", "/game/join", { session: session2 });
	assertStatus(r.status, 200, "User2 join");
	assertEq(r.data, publicGameId, "User2 matched into same public game");

	// ---- Get game state to find player assignments ----
	section("GET /game/:id - Initial game state");

	r = await request("GET", "/game/" + publicGameId, { session: session1 });
	assertStatus(r.status, 200, "Get game");
	const initialState = r.data;
	assert(initialState.player_id_1 != null, "player_id_1 is set");
	assert(initialState.player_id_2 != null, "player_id_2 is set");
	assert(initialState.winner_id === null, "winner_id is null");
	assertEq(initialState.moves, [], "No moves yet");

	const p1Id = initialState.player_id_1;
	const p2Id = initialState.player_id_2;
	info("player_id_1: " + p1Id.slice(0, 16) + "...");
	info("player_id_2: " + p2Id.slice(0, 16) + "...");

	// Determine which session belongs to which player using GET /user
	r = await request("GET", "/user", { session: session1 });
	const user1Id = r.data.user_id;
	let sessionP1, sessionP2;
	if (user1Id === p1Id) {
		info("session1 is player 1");
		sessionP1 = session1;
		sessionP2 = session2;
	} else {
		info("session1 is player 2");
		sessionP1 = session2;
		sessionP2 = session1;
	}

	// Make the first move
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 0 },
		session: sessionP1,
	});

	// =====================
	// MAKING MOVES
	// =====================
	section("POST /game/:id - Make moves");

	// Move 0 already made above: P1 plays (0,0,0)
	assertStatus(r.status, 200, "Move 0 (P1)");
	let state = r.data;
	assertEq(state.moves, [{a:0, r:0, c:0}], "Moves list after move 0");

	// Move 1: P2 plays (0, 0, 1)
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 1 },
		session: sessionP2,
	});
	assertStatus(r.status, 200, "Move 1 (P2)");
	state = r.data;
	assertEq(state.moves, [{a:0,r:0,c:0}, {a:0,r:0,c:1}], "Moves list after move 1");

	// Move 2: P2 plays (0, 0, 2) - P2 gets two moves in a row
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 2 },
		session: sessionP2,
	});
	assertStatus(r.status, 200, "Move 2 (P2)");
	state = r.data;
	assertEq(state.moves, [{a:0,r:0,c:0}, {a:0,r:0,c:1}, {a:0,r:0,c:2}], "Moves list after move 2");

	// Wrong player tries to move
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 3 },
		session: sessionP2,
	});
	assertStatus(r.status, 400, "Wrong player moving");

	// Move 3: P1 plays (0, 0, 3)
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 3 },
		session: sessionP1,
	});
	assertStatus(r.status, 200, "Move 3 (P1)");
	state = r.data;
	assertEq(
		state.moves,
		[{a:0,r:0,c:0}, {a:0,r:0,c:1}, {a:0,r:0,c:2}, {a:0,r:0,c:3}],
		"Moves list after move 3"
	);

	// Duplicate move
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 0 },
		session: sessionP1,
	});
	assert(r.status === 200 && r.data.failure_reason === "ALREADY_TAKEN", "Duplicate move returns ALREADY_TAKEN");

	// =====================
	// UNDO MOVE
	// =====================
	section("POST /game/undo/:id - Undo move");

	// We have 4 moves (even), so undo should fail per the odd-count rule
	r = await request("POST", "/game/undo/" + publicGameId, { session: sessionP1 });
	info("Undo with 4 moves (even): status=" + r.status);
	assertStatus(r.status, 400, "Undo with even move count");

	// Make one more move to get to 5 (odd), then undo should work
	// Move 4: P1 plays (0, 0, 4)
	r = await request("POST", "/game/" + publicGameId, {
		body: { a: 0, r: 0, c: 4 },
		session: sessionP1,
	});
	assertStatus(r.status, 200, "Move 4 (P1)");
	assertEq(
		r.data.moves,
		[{a:0,r:0,c:0}, {a:0,r:0,c:1}, {a:0,r:0,c:2}, {a:0,r:0,c:3}, {a:0,r:0,c:4}],
		"Moves list after move 4"
	);

	// Now 5 moves (odd), current player is P2. Undo should be allowed.
	r = await request("POST", "/game/undo/" + publicGameId, { session: sessionP2 });
	if (r.status === 500) {
		fail("Undo returned 500 - likely bug: 'user' variable not assigned in undo_move (server.py line 337)");
	} else {
		assertStatus(r.status, 200, "Undo");
		assertEq(
			r.data.moves,
			[{a:0,r:0,c:0}, {a:0,r:0,c:1}, {a:0,r:0,c:2}, {a:0,r:0,c:3}],
			"Moves list after undo matches expected (move 4 removed)"
		);
	}

	// =====================
	// GAME CREATION - PRIVATE
	// =====================
	section("POST /game/private - Private game");

	r = await request("POST", "/game/private", { session: sessionP1 });
	assertStatus(r.status, 200, "Create private game");
	const privateGameId = r.data;
	assert(typeof privateGameId === "string" && privateGameId.length > 0, "Returns game id string");
	info("private game id: " + privateGameId.slice(0, 16) + "...");

	// Creating again returns same game (idempotent while waiting for opponent)
	r = await request("POST", "/game/private", { session: sessionP1 });
	assertEq(r.data, privateGameId, "Second private game call returns same game id");

	// ---- Get user profile (now that we know user ids) ----
	section("GET /user/:id - User profile with games");

	r = await request("GET", "/user/" + p1Id);
	assertStatus(r.status, 200, "Get user profile");
	assert(r.data.games.length >= 1, "User has at least 1 game in game list");
	info("user1 has " + r.data.games.length + " game(s), " + r.data.current_game_ids.length + " in-progress");

	// =====================
	// GET /user (current user)
	// =====================
	section("GET /user - Get current user");

	r = await request("GET", "/user", { session: session1 });
	assertStatus(r.status, 200, "Get current user");
	assertEq(r.data.username, NEW_USER1, "Current user username matches");
	assert(Array.isArray(r.data.games), "Current user has games array");
	assert(Array.isArray(r.data.current_game_ids), "Current user has current_game_ids array");

	// =====================
	// DELETED USERS
	// =====================
	section("DELETE /user - Deleted user behavior");

	// Delete user2 and verify behavior
	r = await request("DELETE", "/user", { session: sessionP2 });
	assertStatus(r.status, 204, "Delete user2");

	// Deleted user should return 404 on get
	r = await request("GET", "/user/" + p2Id);
	assertStatus(r.status, 404, "Get deleted user returns 404");

	// Deleted user's session should be expired (403)
	r = await request("POST", "/user/logout", { session: sessionP2 });
	assertStatus(r.status, 403, "Deleted user session is expired");

	// User1's game list should show null opponent_username for the deleted user
	r = await request("GET", "/user/" + p1Id);
	assertStatus(r.status, 200, "Get user1 profile after user2 deleted");
	const gameWithDeletedOpponent = r.data.games.find(g => g.game_id === publicGameId);
	assert(gameWithDeletedOpponent !== undefined, "Public game found in user1's games");
	assertEq(gameWithDeletedOpponent.opponent_username, null, "Deleted opponent username is null");

	// =====================
	// ANONYMOUS USERS
	// =====================
	section("POST /anon_user - Anonymous users");

	r = await request("POST", "/anon_user");
	assertStatus(r.status, 200, "Create anon user");
	const anonSession = r.data;
	assert(typeof anonSession === "string" && anonSession.length > 0, "Returns anon session id");
	info("anon session: " + anonSession.slice(0, 16) + "...");

	// Anon user can get their own info via GET /user
	r = await request("GET", "/user", { session: anonSession });
	assertStatus(r.status, 200, "Get current anon user");
	assertEq(r.data.username, "Anonymous", "Anon user username is Anonymous");

	// Update should no-op for anon user (returns same session)
	r = await request("PUT", "/user", { body: { username: "hacker", password: null }, session: anonSession });
	assertStatus(r.status, 200, "Update anon user returns 200");
	assertEq(r.data, anonSession, "Anon update returns same session id (no-op)");

	// Anon user can still get their info (username unchanged)
	r = await request("GET", "/user", { session: anonSession });
	assertEq(r.data.username, "Anonymous", "Anon username still Anonymous after update attempt");

	// Delete should no-op for anon user
	r = await request("DELETE", "/user", { session: anonSession });
	assertStatus(r.status, 204, "Delete anon user returns 204");

	// Anon user should still be usable after delete no-op
	r = await request("GET", "/user", { session: anonSession });
	assertStatus(r.status, 200, "Anon user still accessible after delete no-op");

	// Anon user can join a game
	r = await request("POST", "/game/join", { session: anonSession });
	assertStatus(r.status, 200, "Anon user can join game");
	const anonGameId = r.data;

	// =====================
	// FORFEIT GAMES
	// =====================
	section("POST /game/forfeit - Forfeit games");

	// Forfeit the public game (both players present, user1 forfeits so user2 wins)
	// user2 is deleted but still has a user_id in the game; winner should be p2Id
	r = await request("POST", "/game/forfeit/" + publicGameId, { session: sessionP1 });
	assertStatus(r.status, 204, "Forfeit public game");

	r = await request("GET", "/game/" + publicGameId);
	assertStatus(r.status, 200, "Get public game after forfeit");
	assertEq(r.data.winner_id, p2Id, "Public game winner is other player (p2)");
	assertEq(r.data.is_your_turn, false, "Public game is_your_turn is false (complete)");

	// Forfeit the private game (only one player, no opponent yet)
	r = await request("POST", "/game/forfeit/" + privateGameId, { session: sessionP1 });
	assertStatus(r.status, 204, "Forfeit private game (no opponent)");

	r = await request("GET", "/game/" + privateGameId);
	assertStatus(r.status, 200, "Get private game after forfeit");
	assertEq(r.data.winner_id, null, "Private game winner is null (no opponent)");
	assertEq(r.data.is_your_turn, false, "Private game is_your_turn is false (complete)");

	// Forfeit the anon game (only one player, no opponent yet)
	r = await request("POST", "/game/forfeit/" + anonGameId, { session: anonSession });
	assertStatus(r.status, 204, "Forfeit anon game (no opponent)");

	r = await request("GET", "/game/" + anonGameId);
	assertStatus(r.status, 200, "Get anon game after forfeit");
	assertEq(r.data.winner_id, null, "Anon game winner is null (no opponent)");
	assertEq(r.data.is_your_turn, false, "Anon game is_your_turn is false (complete)");

	// Forfeiting an already-complete game should 404
	r = await request("POST", "/game/forfeit/" + publicGameId, { session: sessionP1 });
	assertStatus(r.status, 404, "Forfeit already-complete game returns 404");

	// =====================
	// CLEANUP - Delete remaining users
	// =====================
	section("DELETE /user - Cleanup");

	r = await request("DELETE", "/user", { session: sessionP1 });
	assertStatus(r.status, 204, "Delete user1");

	log("\n--- Tests complete ---", "info");
}

runTests().catch(err => {
	fail("Unhandled error: " + err.message);
	info(err.stack);
});
</script>
</body>
</html>
