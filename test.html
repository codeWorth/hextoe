<!DOCTYPE html>
<html>
<head>
	<title>HexToe API Tests</title>
	<style>
		body { font-family: monospace; white-space: pre-wrap; padding: 20px; background: #1a1a1a; color: #ccc; }
		.pass { color: #4caf50; }
		.fail { color: #f44336; }
		.info { color: #64b5f6; }
		.section { color: #ffa726; font-weight: bold; margin-top: 10px; }
	</style>
</head>
<body>
<div id="out"></div>
<script>
const BASE = "http://localhost:8000";
const out = document.getElementById("out");

function log(msg, cls = "") {
	const el = document.createElement("div");
	el.className = cls;
	el.textContent = msg;
	out.appendChild(el);
}

function pass(msg) { log("  PASS: " + msg, "pass"); }
function fail(msg) { log("  FAIL: " + msg, "fail"); }
function info(msg) { log("  " + msg, "info"); }
function section(msg) { log("\n=== " + msg + " ===", "section"); }

function assert(cond, msg) {
	if (cond) pass(msg);
	else fail(msg);
	return cond;
}

function assertStatus(actual, expected, msg) {
	if (actual === expected) {
		pass(msg + " (status " + actual + ")");
	} else {
		fail(msg + " | expected status: " + expected + " | got: " + actual);
	}
	return actual === expected;
}

function assertEq(actual, expected, msg) {
	if (JSON.stringify(actual) === JSON.stringify(expected)) {
		pass(msg);
		return true;
	} else {
		fail(msg + " | expected: " + JSON.stringify(expected) + " | got: " + JSON.stringify(actual));
		return false;
	}
}

async function request(method, path, { body } = {}) {
	const opts = { method, headers: {}, credentials: "same-origin" };
	if (body !== undefined) {
		opts.headers["Content-Type"] = "application/json";
		opts.body = JSON.stringify(body);
	}
	const resp = await fetch(BASE + path, opts);
	let data = null;
	const text = await resp.text();
	try { data = JSON.parse(text); } catch { data = text; }
	return { status: resp.status, data };
}

function sleep(ms) {
	return new Promise(resolve => setTimeout(resolve, ms));
}

// Helper: log in as a specific user (sets the session cookie)
async function loginAs(username, password) {
	const r = await request("POST", "/api/user/login", { body: { username, password } });
	if (r.status !== 204) fail("loginAs(" + username + ") failed with status " + r.status);
	return r.status === 204;
}

// Helper: log out current user (clears the session cookie)
async function logout() {
	await request("POST", "/api/user/logout");
}

// Generate unique usernames to avoid conflicts across test runs
const suffix = Date.now().toString(36);
const USER1 = "testuser1_" + suffix;
const USER2 = "testuser2_" + suffix;
const PASSWORD = "testpass123";

async function runTests() {
	// =====================
	// USER ENDPOINTS
	// =====================
	section("POST /user - Create users");

	let r = await request("POST", "/api/user", { body: { username: USER1, password: PASSWORD } });
	assertStatus(r.status, 204, "Create user1");

	// Creating user1 also logged us in as user1 via cookie. Log out so we can create user2.
	await logout();

	r = await request("POST", "/api/user", { body: { username: USER2, password: PASSWORD } });
	assertStatus(r.status, 204, "Create user2");
	await logout();

	// Duplicate username
	r = await request("POST", "/api/user", { body: { username: USER1, password: PASSWORD } });
	assertStatus(r.status, 409, "Duplicate username");

	// ---- Login ----
	section("POST /user/login");

	r = await request("POST", "/api/user/login", { body: { username: USER1, password: PASSWORD } });
	assertStatus(r.status, 204, "Login user1");

	r = await request("POST", "/api/user/login", { body: { username: USER1, password: "wrongpass" } });
	assertStatus(r.status, 404, "Bad password");

	// We're now logged in as user1 (the failed login didn't change the cookie)

	// ---- Update user ----
	section("PUT /user - Update user");

	r = await request("PUT", "/api/user", { body: { username: null, password: null } });
	assertStatus(r.status, 400, "Null username and password");

	const NEW_USER1 = USER1 + "_renamed";
	r = await request("PUT", "/api/user", { body: { username: NEW_USER1, password: null } });
	assertStatus(r.status, 204, "Update username");

	// ---- Get user ----
	section("GET /user/:id - Get user profile");

	r = await request("GET", "/api/user/nonexistent_id");
	assertStatus(r.status, 404, "Nonexistent user");

	// ---- Logout ----
	section("POST /user/logout");

	r = await request("POST", "/api/user/logout");
	assertStatus(r.status, 204, "Logout");

	// Session should be expired now
	await sleep(500);
	r = await request("POST", "/api/user/logout");
	assertStatus(r.status, 422, "Expired session");

	// Re-login as user1 to continue tests
	await loginAs(NEW_USER1, PASSWORD);
	info("user1 re-logged in");

	// =====================
	// GAME CREATION - PUBLIC
	// =====================
	section("POST /game/join - Public game");

	// Logged in as user1
	r = await request("POST", "/api/game/join");
	assertStatus(r.status, 200, "User1 join");
	const publicGameId = r.data;
	info("public game id: " + publicGameId.slice(0, 16) + "...");

	// Same user joining again returns same game
	r = await request("POST", "/api/game/join");
	assertStatus(r.status, 200, "User1 join again");
	assertEq(r.data, publicGameId, "Returns same game id for user already in a public game");

	// Switch to user2 and join
	await loginAs(USER2, PASSWORD);
	r = await request("POST", "/api/game/join");
	assertStatus(r.status, 200, "User2 join");
	assertEq(r.data, publicGameId, "User2 matched into same public game");

	// ---- Get game state to find player assignments ----
	section("GET /game/:id - Initial game state");

	r = await request("GET", "/api/game/" + publicGameId);
	assertStatus(r.status, 200, "Get game");
	const initialState = r.data;
	assert(initialState.player_id_1 != null, "player_id_1 is set");
	assert(initialState.player_id_2 != null, "player_id_2 is set");
	assert(initialState.winner_id === null, "winner_id is null");
	assertEq(initialState.moves, [], "No moves yet");

	const p1Id = initialState.player_id_1;
	const p2Id = initialState.player_id_2;
	info("player_id_1: " + p1Id.slice(0, 16) + "...");
	info("player_id_2: " + p2Id.slice(0, 16) + "...");

	// Determine which user is which player using GET /user (currently logged in as user2)
	r = await request("GET", "/api/user");
	const user2Id = r.data.user_id;
	// Figure out credentials for P1 and P2
	let p1User, p2User;
	if (user2Id === p1Id) {
		info("user2 is player 1");
		p1User = { username: USER2, password: PASSWORD };
		p2User = { username: NEW_USER1, password: PASSWORD };
	} else {
		info("user2 is player 2");
		p1User = { username: NEW_USER1, password: PASSWORD };
		p2User = { username: USER2, password: PASSWORD };
	}

	// =====================
	// MAKING MOVES
	// =====================
	section("POST /game/:id - Make moves");

	// Login as P1 and make Move 0
	await loginAs(p1User.username, p1User.password);
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 0 } });
	assertStatus(r.status, 200, "Move 0 (P1)");
	let state = r.data;
	assertEq(state.moves, [{a:0,r:0,c:0,p1:true}], "Moves list after move 0");

	// Switch to P2: Move 1
	await loginAs(p2User.username, p2User.password);
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 1 } });
	assertStatus(r.status, 200, "Move 1 (P2)");
	state = r.data;
	assertEq(state.moves, [{a:0,r:0,c:0,p1:true}, {a:0,r:0,c:1,p1:false}], "Moves list after move 1");

	// Move 2: P2 plays again (two in a row)
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 2 } });
	assertStatus(r.status, 200, "Move 2 (P2)");
	state = r.data;
	assertEq(state.moves, [{a:0,r:0,c:0,p1:true}, {a:0,r:0,c:1,p1:false}, {a:0,r:0,c:2,p1:false}], "Moves list after move 2");

	// Wrong player tries to move (still logged in as P2, but it's P1's turn)
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 3 } });
	assertStatus(r.status, 400, "Wrong player moving");

	// Switch to P1: Move 3
	await loginAs(p1User.username, p1User.password);
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 3 } });
	assertStatus(r.status, 200, "Move 3 (P1)");
	state = r.data;
	assertEq(
		state.moves,
		[{a:0,r:0,c:0,p1:true}, {a:0,r:0,c:1,p1:false}, {a:0,r:0,c:2,p1:false}, {a:0,r:0,c:3,p1:true}],
		"Moves list after move 3"
	);

	// Duplicate move (still P1's turn)
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 0 } });
	assert(r.status === 200 && r.data.failure_reason === "ALREADY_TAKEN", "Duplicate move returns ALREADY_TAKEN");

	// =====================
	// UNDO MOVE
	// =====================
	section("POST /game/undo/:id - Undo move");

	// 4 moves (even), undo should succeed
	r = await request("POST", "/api/game/undo/" + publicGameId);
	info("Undo with 4 moves (even): status=" + r.status);
	assertStatus(r.status, 200, "Undo");
	assertEq(
		r.data.moves,
		[{a:0,r:0,c:0,p1:true}, {a:0,r:0,c:1,p1:false}, {a:0,r:0,c:2,p1:false}],
		"Moves list after undo matches expected (move 3 removed)"
	);


	// Move 4: P1 plays (0, 0, 4)
	r = await request("POST", "/api/game/" + publicGameId, { body: { a: 0, r: 0, c: 4 } });
	assertStatus(r.status, 200, "Move 4 (P1)");
	assertEq(
		r.data.moves,
		[{a:0,r:0,c:0,p1:true}, {a:0,r:0,c:1,p1:false}, {a:0,r:0,c:2,p1:false}, {a:0,r:0,c:4,p1:true}],
		"Moves list after move 4"
	);

	// 5 moves (odd), switch to P2 and undo, should fail
	await loginAs(p2User.username, p2User.password);
	r = await request("POST", "/api/game/undo/" + publicGameId);
	assertStatus(r.status, 400, "Undo with odd move count");

	// =====================
	// GAME CREATION - PRIVATE
	// =====================
	section("POST /game/private - Private game");

	// Login as P1 user for private game
	await loginAs(p1User.username, p1User.password);
	r = await request("POST", "/api/game/private");
	assertStatus(r.status, 200, "Create private game");
	const privateGameId = r.data;
	assert(typeof privateGameId === "string" && privateGameId.length > 0, "Returns game id string");
	info("private game id: " + privateGameId.slice(0, 16) + "...");

	// Creating again returns same game (idempotent while waiting for opponent)
	r = await request("POST", "/api/game/private");
	assertEq(r.data, privateGameId, "Second private game call returns same game id");

	// ---- Get user profile (now that we know user ids) ----
	section("GET /user/:id - User profile with games");

	r = await request("GET", "/api/user/" + p1Id);
	assertStatus(r.status, 200, "Get user profile");
	assert(r.data.games.length >= 1, "User has at least 1 game in game list");
	info("p1 user has " + r.data.games.length + " game(s), " + r.data.current_game_ids.length + " in-progress");

	// =====================
	// GET /user (current user)
	// =====================
	section("GET /user - Get current user");

	// Currently logged in as P1 user
	r = await request("GET", "/api/user");
	assertStatus(r.status, 200, "Get current user");
	assertEq(r.data.username, p1User.username, "Current user username matches");
	assert(Array.isArray(r.data.games), "Current user has games array");
	assert(Array.isArray(r.data.current_game_ids), "Current user has current_game_ids array");

	// =====================
	// DELETED USERS
	// =====================
	section("DELETE /user - Deleted user behavior");

	// Login as user2 and delete
	await loginAs(USER2, PASSWORD);
	r = await request("DELETE", "/api/user");
	assertStatus(r.status, 204, "Delete user2");

	// Deleted user should return 404 on get
	r = await request("GET", "/api/user/" + p2Id);
	assertStatus(r.status, 404, "Get deleted user returns 404");

	// Deleted user's session should be expired (cookie was cleared)
	r = await request("POST", "/api/user/logout");
	assertStatus(r.status, 422, "Deleted user session is expired");

	// User1's game list should show null opponent_username for the deleted user
	r = await request("GET", "/api/user/" + p1Id);
	assertStatus(r.status, 200, "Get user1 profile after user2 deleted");
	const gameWithDeletedOpponent = r.data.games.find(g => g.game_id === publicGameId);
	assert(gameWithDeletedOpponent !== undefined, "Public game found in user1's games");
	assertEq(gameWithDeletedOpponent.opponent_username, null, "Deleted opponent username is null");

	// =====================
	// ANONYMOUS USERS
	// =====================
	section("POST /anon_user - Anonymous users");

	r = await request("POST", "/api/anon_user");
	assertStatus(r.status, 204, "Create anon user");

	// Anon user can get their own info via GET /user
	r = await request("GET", "/api/user");
	assertStatus(r.status, 200, "Get current anon user");
	assertEq(r.data.username, "Anonymous", "Anon user username is Anonymous");

	// Update should no-op for anon user
	r = await request("PUT", "/api/user", { body: { username: "hacker", password: null } });
	assertStatus(r.status, 204, "Update anon user returns 204");

	// Anon user can still get their info (username unchanged)
	r = await request("GET", "/api/user");
	assertEq(r.data.username, "Anonymous", "Anon username still Anonymous after update attempt");

	// Delete should no-op for anon user
	r = await request("DELETE", "/api/user");
	assertStatus(r.status, 204, "Delete anon user returns 204");

	// Anon user should still be usable after delete no-op
	r = await request("GET", "/api/user");
	assertStatus(r.status, 200, "Anon user still accessible after delete no-op");

	// Anon user can join a game
	r = await request("POST", "/api/game/join");
	assertStatus(r.status, 200, "Anon user can join game");
	const anonGameId = r.data;

	// =====================
	// FORFEIT GAMES
	// =====================
	section("POST /game/forfeit - Forfeit games");

    // Forfeit the anon game, before we log out and lose the session tokem
	r = await request("POST", "/api/game/forfeit/" + anonGameId);
	assertStatus(r.status, 204, "Forfeit anon game");

	// Forfeit the public game - login as P1 user (user1) to forfeit
	await loginAs(p1User.username, p1User.password);
	r = await request("POST", "/api/game/forfeit/" + publicGameId);
	assertStatus(r.status, 204, "Forfeit public game");

	r = await request("GET", "/api/game/" + publicGameId);
	assertStatus(r.status, 200, "Get public game after forfeit");
	assertEq(r.data.winner_id, p2Id, "Public game winner is other player (p2)");
	assertEq(r.data.is_your_turn, false, "Public game is_your_turn is false (complete)");

	// Forfeit the private game (only one player, no opponent yet)
	r = await request("POST", "/api/game/forfeit/" + privateGameId);
	assertStatus(r.status, 204, "Forfeit private game (no opponent)");

	r = await request("GET", "/api/game/" + privateGameId);
	assertStatus(r.status, 200, "Get private game after forfeit");
	assertEq(r.data.winner_id, null, "Private game winner is null (no opponent)");
	assertEq(r.data.is_your_turn, false, "Private game is_your_turn is false (complete)");

	// Forfeiting an already-complete game should 404
	r = await request("POST", "/api/game/forfeit/" + publicGameId);
	assertStatus(r.status, 404, "Forfeit already-complete game returns 404");

	// =====================
	// GET /api/games - List recent games
	// =====================
	section("POST /games - List recent games");

	r = await request("POST", "/api/games");
	assertStatus(r.status, 200, "Get games list");
	assert(Array.isArray(r.data), "Response is an array");

	// Only the public game should appear (both players set and is_public)
	const publicEntry = r.data.find(g => g.game_id === publicGameId);
	assert(publicEntry !== undefined, "Public game found in games list");
	assertEq(publicEntry.p1_uname, p1User.username, "Public game p1 username matches");
	assertEq(publicEntry.p2_uname, null, "Public game p2 username is null (deleted user)");
	assertEq(publicEntry.total_moves, 4, "Public game has 4 moves");
	assertEq(publicEntry.is_complete, true, "Public game is complete (forfeited)");

	// Private and anon games should NOT appear
	const privateEntry = r.data.find(g => g.game_id === privateGameId);
	assertEq(privateEntry, undefined, "Private game not in public games list");
	const anonEntry = r.data.find(g => g.game_id === anonGameId);
	assertEq(anonEntry, undefined, "Anon game not in public games list");

	// =====================
	// CLEANUP - Delete remaining users
	// =====================
	section("DELETE /user - Cleanup");

	// Already logged in as P1 user
	r = await request("DELETE", "/api/user");
	assertStatus(r.status, 204, "Delete user1");

	log("\n--- Tests complete ---", "info");
}

runTests().catch(err => {
	fail("Unhandled error: " + err.message);
	info(err.stack);
});
</script>
</body>
</html>
