<!DOCTYPE html>
<html>
<head>
	<title>HexToe - Change Login Info</title>
	<link rel="stylesheet" href="/src/hextoe.css">
	<style>
		body { min-height: 100vh; }

		.form-container {
			display: flex; flex-direction: column; align-items: center;
			justify-content: center; padding: 60px 32px; gap: 12px;
		}
		.form-container h2 {
			font-size: 22px; color: var(--text); margin-bottom: 8px;
		}
		input {
			width: 300px; padding: 12px 16px; border: 2px solid var(--border); border-radius: 6px;
			background: var(--bg-panel); color: var(--text); font-size: 16px; outline: none;
		}
		input:focus { border-color: var(--green); }
		input::placeholder { color: var(--text-placeholder); }

		.divider {
			width: 300px; height: 1px; background: var(--border); margin: 8px 0;
		}
		.form-container button { width: 300px; padding: 12px; }

		.info-text { color: var(--text-muted); font-size: 13px; max-width: 300px; text-align: center; }
		.error { color: var(--error); font-size: 14px; min-height: 20px; }
		.success { color: var(--green); font-size: 14px; min-height: 20px; }
	</style>
</head>
<body>
	<div class="header">
		<h1 onclick="window.location.href='/'">HexToe</h1>
		<div class="header-right" id="header-right"></div>
	</div>
	<div class="form-container">
		<h2>Change Login Info</h2>
		<input type="text" id="username" placeholder="Username" autocomplete="username">
		<input type="password" id="password" placeholder="Password" autocomplete="current-password">
		<div class="divider"></div>
		<input type="text" id="new-username" placeholder="New Username" autocomplete="off">
		<input type="password" id="new-password" placeholder="New Password" autocomplete="new-password">
		<div class="info-text">Leave the New Password box blank to keep your current password</div>
		<div class="error" id="error"></div>
		<div class="success" id="success"></div>
		<button class="btn-primary" onclick="doSubmit()">Submit</button>
	</div>

<script src="/src/util.js"></script>
<script>
const errorEl = document.getElementById("error");
const successEl = document.getElementById("success");
const usernameEl = document.getElementById("username");
const passwordEl = document.getElementById("password");
const newUsernameEl = document.getElementById("new-username");
const newPasswordEl = document.getElementById("new-password");

async function init() {
	await loadCurrentUser();
	if (!currentUser) {
		window.location.href = "/login";
		return;
	}
	renderHeader();
	usernameEl.value = currentUser.username;
	newUsernameEl.value = currentUser.username;
}

async function doSubmit() {
	errorEl.textContent = "";
	successEl.textContent = "";

	const username = usernameEl.value.trim();
	const password = passwordEl.value;
	const newUsername = newUsernameEl.value.trim();
	const newPassword = newPasswordEl.value;

	if (!username || !newUsername) {
		errorEl.textContent = "Username fields cannot be empty.";
		return;
	}
	if (!password) {
		errorEl.textContent = "Please enter your current password.";
		return;
	}

	// First, log in with current credentials to verify identity
	const loginR = await api("POST", "/api/user/login", { body: { username, password } });
	if (loginR.status !== 204) {
		errorEl.textContent = "Incorrect login info.";
		return;
	}

	// Build update payload
	const updateBody = { username: newUsername };
	if (newPassword) {
		updateBody.password = newPassword;
	} else {
		updateBody.password = null;
	}

	const updateR = await api("PUT", "/api/user", { body: updateBody });
	if (updateR.status === 204) {
		usernameEl.value = "";
		passwordEl.value = "";
		newUsernameEl.value = "";
		newPasswordEl.value = "";
		successEl.textContent = "Updated your login info";
		await loadCurrentUser();
		renderHeader();
	} else {
		errorEl.textContent = "Failed to update. Please try again.";
	}
}

init();
</script>
</body>
</html>
