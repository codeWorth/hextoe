<!DOCTYPE html>
<html>
<head>
	<title>HexToe</title>
	<link rel="stylesheet" href="/src/hextoe.css">
	<style>
		html, body { height: 100%; }
		body { display: flex; flex-direction: column; }

		.button-row {
			display: flex; justify-content: center; gap: 16px;
			padding: 20px 32px;
		}
		.button-row button { width: 220px; padding: 14px; font-size: 18px; }

		.viewer {
			flex: 1; display: flex; overflow: hidden; padding: 0 24px 24px 24px; gap: 16px;
			min-height: 0; justify-content: center;
		}

		.canvas-area {
			position: relative; aspect-ratio: 4 / 3; height: 100%; max-width: calc(100% - 316px);
		}
		.canvas-wrap { width: 100%; height: 100%; overflow: hidden; }

		.game-list {
			width: 300px; min-width: 240px; background: var(--bg-dark); border-radius: 8px;
			border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
		}
		.game-list-header {
			padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--text-dim);
			border-bottom: 1px solid var(--border);
		}
		.game-list-items { flex: 1; overflow-y: auto; }

		.game-entry {
			display: flex; align-items: center; padding: 10px 14px;
			cursor: pointer; border-bottom: 1px solid var(--border-subtle); font-size: 14px;
		}
		.game-entry:hover { background: var(--border-subtle); }
		.game-entry.selected { background: var(--green-bg); }
		.game-entry .p1 { flex: 1; text-align: left; }
		.game-entry .moves { flex: 0 0 auto; text-align: center; color: var(--text-dim); font-size: 12px; padding: 0 8px; }
		.game-entry .p2 { flex: 1; text-align: right; }
		.game-entry .winner { color: var(--green); }
		.game-entry .draw { color: var(--text-placeholder); }
	</style>
</head>
<body>
	<div class="header">
		<h1>HexToe</h1>
		<div class="header-right" id="header-right"></div>
	</div>
	<div class="button-row">
		<button class="btn-primary" onclick="play()">Play</button>
		<button class="btn-secondary" onclick="createPrivate()">Create Private Room</button>
	</div>
	<div class="viewer">
		<div class="canvas-area">
			<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
			<button class="recenter-btn" onclick="cam.reset();" title="Re-center">&#x2316;</button>
		</div>
		<div class="game-list">
			<div class="game-list-header">Recent Games</div>
			<div class="game-list-items" id="game-list-items"></div>
		</div>
	</div>

<script src="/src/hex.js"></script>
<script src="/src/util.js"></script>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const gameListEl = document.getElementById("game-list-items");

let _games = [];
let _selectedGameId = null;
let _selectedGameState = null;

async function play() {
	if (!await ensureSession()) return;
	const r = await api("POST", "/api/game/join");
	if (r.status === 200) {
		window.location.href = "/game/" + r.data;
	}
}

async function createPrivate() {
	if (!await ensureSession()) return;
	const r = await api("POST", "/api/game/private");
	if (r.status === 200) {
		window.location.href = "/game/" + r.data;
	}
}

// -- Game list and viewer --

function renderGameList() {
	gameListEl.innerHTML = "";
	for (const game of _games) {
		const entry = document.createElement("div");
		entry.className = "game-entry" + (game.game_id === _selectedGameId ? " selected" : "");
		entry.onmouseenter = () => previewGame(game.game_id);
		entry.onclick = () => { window.location.href = "/game/" + game.game_id; };

		const p1 = document.createElement("span");
		p1.className = "p1";
		p1.textContent = game.p1_uname || "[Deleted]";

		const mid = document.createElement("span");
		mid.className = "moves";
		mid.textContent = "Move " + game.total_moves;

		const p2 = document.createElement("span");
		p2.className = "p2";
		p2.textContent = game.p2_uname || "[Deleted]";

		if (game.is_complete && game.winner_index === 1) {
			p1.classList.add("winner");
		} else if (game.is_complete && game.winner_index === 2) {
			p2.classList.add("winner");
		} else if (game.is_complete && game.winner_index === 0) {
			p1.classList.add("draw");
			p2.classList.add("draw");
		}

		entry.appendChild(p1);
		entry.appendChild(mid);
		entry.appendChild(p2);
		gameListEl.appendChild(entry);
	}
}

async function previewGame(gameId) {
	if (gameId === _selectedGameId) return;
	_selectedGameId = gameId;
	cam.x = 0; cam.y = 0;
	renderGameList();
	await fetchSelectedGameState();
}

async function fetchSelectedGameState() {
	if (!_selectedGameId) {
		_selectedGameState = null;
		renderCanvas();
		return;
	}
	const r = await api("GET", "/api/game/" + _selectedGameId);
	if (r.status === 200) {
		_selectedGameState = r.data;
	} else {
		_selectedGameState = null;
	}
	renderCanvas();
}

const cam = setupPanning(canvas, renderCanvas);

function renderCanvas() {
	const moves = _selectedGameState ? _selectedGameState.moves : null;
	renderHexGrid(canvas, ctx, cam.x, cam.y, moves);
}

async function loadGames() {
	const r = await api("POST", "/api/games");
	if (r.status === 200 && Array.isArray(r.data)) {
		_games = r.data;
		// Default to most recent game if nothing selected
		if (!_selectedGameId && _games.length > 0) {
			_selectedGameId = _games[0].game_id;
		}
		renderGameList();
		await fetchSelectedGameState();
	}
}

// -- Resize --

window.addEventListener("resize", renderCanvas);

// -- Init --

async function init() {
	await loadCurrentUser();
	renderHeader();
	await loadGames();
	setInterval(async () => {
		await loadGames();
	}, 5000);
}
init();
</script>
</body>
</html>
