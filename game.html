<!DOCTYPE html>
<html>
<head>
	<title>HexToe - Game</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2b2b2b; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

		.header {
			display: flex; justify-content: space-between; align-items: center;
			padding: 12px 32px; background: #232323; border-bottom: 2px solid #3a3a3a;
		}
		.header h1 { font-size: 24px; color: #5e8c61; letter-spacing: 2px; cursor: pointer; }
		.header-right { display: flex; align-items: center; gap: 16px; }
		.header-right .username { color: #aaa; font-size: 16px; }
		.btn-primary { background: #4a7c4f; color: #eee; border: none; border-radius: 6px; padding: 6px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
		.btn-primary:hover { background: #5e8c61; }
		.btn-secondary { background: #3a3a3a; color: #d4d4d4; border: none; border-radius: 6px; padding: 6px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
		.btn-secondary:hover { background: #4a4a4a; }

		.game-container {
			display: flex; flex: 1; overflow: hidden; min-height: 0;
		}
		.canvas-area {
			flex: 1; position: relative; padding: 16px; display: flex;
		}
		.canvas-wrap { flex: 1; min-width: 0; min-height: 0; overflow: hidden; }
		canvas { background: #252525; border-radius: 8px; }
		.recenter-btn {
			position: absolute; bottom: 28px; right: 28px;
			width: 36px; height: 36px; border: none; border-radius: 6px;
			background: rgba(58, 58, 58, 0.8); color: #999; font-size: 20px;
			cursor: pointer; display: flex; align-items: center; justify-content: center;
		}
		.recenter-btn:hover { background: rgba(74, 74, 74, 1); color: #d4d4d4; }
		.forfeit-btn {
			border: none; border-radius: 6px; padding: 8px 14px; margin-top: 12px;
			background: #3a3a3a; color: #999; font-size: 13px; font-weight: 600;
			cursor: pointer; width: 100%;
		}
		.forfeit-btn:hover { background: #4a4a4a; color: #ccc; }

		.sidebar {
			width: 280px; background: #232323; border-left: 2px solid #3a3a3a;
			display: flex; flex-direction: column; padding: 16px; min-height: 0; overflow: hidden;
		}
		.turn-indicator {
			padding: 12px; text-align: center; font-size: 16px; font-weight: 600;
			border-radius: 6px; margin-bottom: 12px;
		}
		.turn-yours { background: #2a3a2a; color: #5e8c61; }
		.turn-waiting { background: #333; color: #999; }
		.turn-over { background: #333; color: #aaa; }

		.player-info { margin-bottom: 12px; font-size: 14px; }
		.player-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
		.player-symbol { font-weight: 700; width: 16px; text-align: center; }
		.player-symbol.x { color: #cc9999; }
		.player-symbol.o { color: #9999cc; }
		.player-name { color: #bbb; }

		.move-list-header { font-size: 14px; color: #888; margin-bottom: 8px; }
		.move-list {
			flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; gap: 2px;
		}
		.move-item {
			padding: 6px 10px; border-radius: 4px; font-size: 13px; font-family: monospace; cursor: default;
		}
		.move-item:hover { filter: brightness(1.3); outline: 1px solid rgba(255,255,255,0.15); }
		.move-p1 { background: #3a2a2a; color: #cc9999; }
		.move-p2 { background: #2a2a3a; color: #9999cc; }
	</style>
</head>
<body>
	<div class="header">
		<h1 onclick="window.location.href='/'">HexToe</h1>
		<div class="header-right" id="header-right"></div>
	</div>
	<div class="game-container">
		<div class="canvas-area">
			<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
			<button class="recenter-btn" onclick="camX=0;camY=0;render();" title="Re-center">&#x2316;</button>
		</div>
		<div class="sidebar">
			<div class="turn-indicator" id="turn-indicator"></div>
			<div class="player-info" id="player-info"></div>
			<div class="move-list-header">Move History</div>
			<div class="move-list" id="move-list"></div>
			<button class="forfeit-btn" id="forfeit-btn" onclick="doForfeit()">Forfeit</button>
		</div>
	</div>

<script src="/src/hex.js"></script>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const moveListEl = document.getElementById("move-list");
const turnEl = document.getElementById("turn-indicator");

// Extract game_id from URL: /game/<game_id>
const pathParts = window.location.pathname.split("/");
const gameId = pathParts[pathParts.length - 1];

// Viewport: camera offset in pixel space
let camX = 0, camY = 0;
let dragging = false, dragStartX = 0, dragStartY = 0, camStartX = 0, camStartY = 0;

let _gameState = null;
let pollTimer = null;
let myUserId = null;
let myUsername = null;
let maxMoveId = -1;

function renderHeader() {
	const el = document.getElementById("header-right");
	el.innerHTML = "";
	if (myUsername) {
		const span = document.createElement("span");
		span.className = "username";
		span.textContent = myUsername;
		el.appendChild(span);
		const btn = document.createElement("button");
		btn.className = "btn-secondary";
		btn.textContent = "Logout";
		btn.onclick = doLogout;
		el.appendChild(btn);
	} else {
		const btn = document.createElement("button");
		btn.className = "btn-primary";
		btn.textContent = "Login";
		btn.onclick = () => { window.location.href = "/login"; };
		el.appendChild(btn);
	}
}

async function doLogout() {
	await api("POST", "/api/user/logout");
	myUserId = null;
	myUsername = null;
	renderHeader();
	renderTurnIndicator();
}

function setGameState(val) {
	_gameState = val;
	render();
	renderPlayerInfo();
	renderMoveList();
	renderTurnIndicator();
}

// -- API --

async function api(method, path, { body } = {}) {
	const opts = { method, headers: {}, credentials: "same-origin" };
	if (body !== undefined) {
		opts.headers["Content-Type"] = "application/json";
		opts.body = JSON.stringify(body);
	}
	const resp = await fetch(path, opts);
	let data = null;
	const text = await resp.text();
	try { data = JSON.parse(text); } catch { data = text; }
	return { status: resp.status, data };
}

async function fetchGameState() {
	const r = await api("GET", "/api/game/" + gameId);
	if (r.status === 200) setGameState(r.data);
}

async function makeMove(a, r, c) {
	if (!_gameState || !_gameState.is_your_turn) return;
	const resp = await api("POST", "/api/game/" + gameId, { body: { a, r, c } });
	if (resp.status === 200) {
		if (resp.data.failure_reason) return;
		setGameState(resp.data);
	}
}

// -- Drawing --

function render() {
	const moves = _gameState ? _gameState.moves : null;
    let submoves = moves;
    if (maxMoveId >= 0) {
        submoves = moves.slice(0, maxMoveId + 1);
    }
	renderHexGrid(canvas, ctx, camX, camY, submoves);
}

function renderPlayerInfo() {
	const el = document.getElementById("player-info");
	el.innerHTML = "";
	if (!_gameState) return;

	let p1Name = _gameState.p1_uname;
	let p2Name = _gameState.p2_uname;
    if (!_gameState.player_id_1 || !_gameState.player_id_2) {
        p1Name = p1Name || "...";
        p2Name = p2Name || "...";
    } else {
        p1Name = p1Name || "[Deleted]";
        p2Name = p2Name || "[Deleted]";    
    }

	// If both are Anonymous and we're in the game, label ourselves "You"
	const isP1 = myUserId && myUserId === _gameState.player_id_1;
	const isP2 = myUserId && myUserId === _gameState.player_id_2;
	if (p1Name === "Anonymous" && p2Name === "Anonymous") {
		if (isP1) p1Name = "You";
		else if (isP2) p2Name = "You";
	}

	const p1Won = _gameState.winner_id && _gameState.winner_id === _gameState.player_id_1;
	const p2Won = _gameState.winner_id && _gameState.winner_id === _gameState.player_id_2;

	function makeRow(symbol, symbolClass, name, isWinner) {
		const row = document.createElement("div");
		row.className = "player-row";
		const sym = document.createElement("span");
		sym.className = "player-symbol " + symbolClass;
		sym.textContent = symbol;
		const nm = document.createElement("span");
		nm.className = "player-name";
		nm.textContent = name;
		if (isWinner) {
            nm.style.color = "#5e8c61";
            nm.textContent += " (Winner!)";
        }
		row.appendChild(sym);
		row.appendChild(nm);
		return row;
	}

	el.appendChild(makeRow("X", "x", p1Name, p1Won));
	el.appendChild(makeRow("O", "o", p2Name, p2Won));
}

function renderMoveList() {
	moveListEl.innerHTML = "";
	if (!_gameState) return;
	_gameState.moves.forEach((move, i) => {
		const el = document.createElement("div");
		el.className = "move-item " + (move.p1 ? "move-p1" : "move-p2");
		const label = move.p1 ? "X" : "O";
		el.textContent = (i + 1) + ". " + label + " (" + move.a + ", " + move.r + ", " + move.c + ")";
		el.onmouseenter = () => { maxMoveId = i; render(); };
		moveListEl.appendChild(el);
	});
	moveListEl.scrollTop = moveListEl.scrollHeight;
	moveListEl.onmouseleave = () => { maxMoveId = -1; render(); };
}

function renderTurnIndicator() {
	turnEl.innerHTML = "";
	const forfeitBtn = document.getElementById("forfeit-btn");
	if (!_gameState) {
		turnEl.textContent = "Loading...";
		turnEl.className = "turn-indicator turn-waiting";
		forfeitBtn.style.display = "none";
		return;
	}
	const inProgress = !_gameState.winner_id && _gameState.player_id_1 && _gameState.player_id_2;
    const isPlayer = myUserId && (
        _gameState.player_id_1 === myUserId || _gameState.player_id_2 === myUserId
    );
	forfeitBtn.style.display = inProgress ? "" : "none";
	if (_gameState.winner_id) {
		turnEl.textContent = "Game Over";
		turnEl.className = "turn-indicator turn-over";
	} else if (!_gameState.player_id_1 || !_gameState.player_id_2) {
		if (isPlayer) {
			turnEl.textContent = "Waiting for opponent...";
			turnEl.className = "turn-indicator turn-waiting";
		} else {
			turnEl.className = "turn-indicator turn-yours";
			const btn = document.createElement("button");
			btn.textContent = "Join Game";
			btn.style.cssText = "background:#4a7c4f;color:#eee;border:none;border-radius:4px;padding:8px 20px;font-size:15px;font-weight:600;cursor:pointer;";
			btn.onclick = joinThisGame;
			turnEl.appendChild(btn);
		}
	} else if (_gameState.is_your_turn) {
		turnEl.textContent = "Your turn!";
		turnEl.className = "turn-indicator turn-yours";
	} else {
        if (isPlayer) {
		    turnEl.textContent = "Opponent's turn";
        } else {
            turnEl.textContent = "Game in progress...";
        }
		turnEl.className = "turn-indicator turn-waiting";
	}
}

async function ensureSession() {
	const r = await api("GET", "/api/user");
	if (r.status === 200) { myUserId = r.data.user_id; myUsername = r.data.username; renderHeader(); return true; }
	const a = await api("POST", "/api/anon_user");
	if (a.status === 204) {
		const u = await api("GET", "/api/user");
		if (u.status === 200) { myUserId = u.data.user_id; myUsername = u.data.username; renderHeader(); }
		return true;
	}
	return false;
}

async function joinThisGame() {
	if (!await ensureSession()) return;
	const r = await api("POST", "/api/game/join/" + gameId);
	if (r.status === 200) {
		await fetchGameState();
	}
}

async function doForfeit() {
	if (!_gameState) return;
	const r = await api("POST", "/api/game/forfeit/" + gameId);
	if (r.status === 204) {
		await fetchGameState();
	}
}

// -- Input handling --

canvas.addEventListener("mousedown", (e) => {
	dragging = true;
	dragStartX = e.clientX;
	dragStartY = e.clientY;
	camStartX = camX;
	camStartY = camY;
});

window.addEventListener("mousemove", (e) => {
	if (!dragging) return;
	camX = camStartX - (e.clientX - dragStartX);
	camY = camStartY - (e.clientY - dragStartY);
	render();
});

window.addEventListener("mouseup", (e) => {
	if (!dragging) return;
	dragging = false;
	const dx = e.clientX - dragStartX;
	const dy = e.clientY - dragStartY;
	// Only treat as click if barely moved
	if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
		handleClick(e);
	}
});

function handleClick(e) {
	if (!_gameState || !_gameState.is_your_turn) return;
	const rect = canvas.getBoundingClientRect();
	const dpr = window.devicePixelRatio || 1;
	const w = canvas.width / dpr;
	const h = canvas.height / dpr;
	const mx = e.clientX - rect.left;
	const my = e.clientY - rect.top;
	const wx = mx + camX - w / 2;
	const wy = my + camY - h / 2;
	const hex = pixelToHex(wx, wy);

	// If clicking on own piece, attempt undo
	const imP1 = myUserId === _gameState.player_id_1;
	const existing = _gameState.moves.find(m => m.a === hex.a && m.r === hex.r && m.c === hex.c);
	if (existing && existing.p1 === imP1) {
		undoMove();
		return;
	}

	makeMove(hex.a, hex.r, hex.c);
}

async function undoMove() {
	const resp = await api("POST", "/api/game/undo/" + gameId);
	if (resp.status === 200) setGameState(resp.data);
}

// -- Resize --

window.addEventListener("resize", () => { render(); });

// -- Init --

async function init() {
	const r = await api("GET", "/api/user");
	if (r.status === 200) {
		myUserId = r.data.user_id;
		myUsername = r.data.username;
	}
	renderHeader();
	await fetchGameState();
	pollTimer = setInterval(fetchGameState, 5000);
}
init();
</script>
</body>
</html>
