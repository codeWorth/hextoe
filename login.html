<!DOCTYPE html>
<html>
<head>
	<title>HexToe - Login</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2b2b2b; color: #d4d4d4; min-height: 100vh; }

		.header {
			display: flex; align-items: center;
			padding: 16px 32px; background: #232323; border-bottom: 2px solid #3a3a3a;
		}
		.header h1 { font-size: 28px; color: #5e8c61; letter-spacing: 2px; cursor: pointer; }

		.login-container {
			display: flex; flex-direction: column; align-items: center;
			justify-content: center; padding: 80px 32px; gap: 16px;
		}
		input {
			width: 300px; padding: 12px 16px; border: 2px solid #3a3a3a; border-radius: 6px;
			background: #333; color: #d4d4d4; font-size: 16px; outline: none;
		}
		input:focus { border-color: #5e8c61; }
		input::placeholder { color: #666; }

		button {
			width: 300px; padding: 12px; border: none; border-radius: 6px; cursor: pointer;
			font-size: 16px; font-weight: 600; transition: background 0.2s;
		}
		.btn-primary { background: #4a7c4f; color: #eee; }
		.btn-primary:hover { background: #5e8c61; }
		.btn-secondary { background: #3a3a3a; color: #d4d4d4; }
		.btn-secondary:hover { background: #4a4a4a; }

		.error { color: #c45; font-size: 14px; min-height: 20px; }
	</style>
</head>
<body>
	<div class="header">
		<h1 onclick="window.location.href='/'">HexToe</h1>
	</div>
	<div class="login-container">
		<input type="text" id="username" placeholder="Username" autocomplete="username">
		<input type="password" id="password" placeholder="Password" autocomplete="current-password">
		<div class="error" id="error"></div>
		<button class="btn-primary" onclick="doLogin()">Login</button>
		<button class="btn-secondary" onclick="doCreate()">Create Account</button>
	</div>

<script>
const errorEl = document.getElementById("error");

async function api(method, path, { body } = {}) {
	const opts = { method, headers: {}, credentials: "same-origin" };
	if (body !== undefined) {
		opts.headers["Content-Type"] = "application/json";
		opts.body = JSON.stringify(body);
	}
	const resp = await fetch(path, opts);
	let data = null;
	const text = await resp.text();
	try { data = JSON.parse(text); } catch { data = text; }
	return { status: resp.status, data };
}

function getFields() {
	const username = document.getElementById("username").value.trim();
	const password = document.getElementById("password").value;
	if (!username || !password) {
		errorEl.textContent = "Please enter both username and password.";
		return null;
	}
	return { username, password };
}

async function doLogin() {
	errorEl.textContent = "";
	const fields = getFields();
	if (!fields) return;
	const r = await api("POST", "/api/user/login", { body: fields });
	if (r.status === 204) {
		window.location.href = "/";
	} else if (r.status === 404) {
		errorEl.textContent = "Invalid username or password.";
	} else {
		errorEl.textContent = "Something went wrong. Please try again.";
	}
}

async function doCreate() {
	errorEl.textContent = "";
	const fields = getFields();
	if (!fields) return;
	const r = await api("POST", "/api/user", { body: fields });
	if (r.status === 204) {
		window.location.href = "/";
	} else if (r.status === 409) {
		errorEl.textContent = "That username is already taken.";
	} else {
		errorEl.textContent = "Something went wrong. Please try again.";
	}
}

document.getElementById("password").addEventListener("keydown", (e) => {
	if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
