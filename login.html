<!DOCTYPE html>
<html>
<head>
	<title>HexToe - Login</title>
	<link rel="stylesheet" href="/src/hextoe.css">
	<style>
		body { min-height: 100vh; }

		.login-container {
			display: flex; flex-direction: column; align-items: center;
			justify-content: center; padding: 80px 32px; gap: 16px;
		}
		input {
			width: 300px; padding: 12px 16px; border: 2px solid var(--border); border-radius: 6px;
			background: var(--bg-panel); color: var(--text); font-size: 16px; outline: none;
		}
		input:focus { border-color: var(--green); }
		input::placeholder { color: var(--text-placeholder); }

		.login-container button { width: 300px; padding: 12px; }

		.error { color: var(--error); font-size: 14px; min-height: 20px; }
	</style>
</head>
<body>
	<div class="header">
		<h1 onclick="window.location.href='/'">HexToe</h1>
	</div>
	<div class="login-container">
		<input type="text" id="username" placeholder="Username" autocomplete="username">
		<input type="password" id="password" placeholder="Password" autocomplete="current-password">
		<div class="error" id="error"></div>
		<button class="btn-primary" onclick="doLogin()">Login</button>
		<button class="btn-secondary" onclick="doCreate()">Create Account</button>
	</div>

<script src="/src/util.js"></script>
<script>
const errorEl = document.getElementById("error");

function getFields() {
	const username = document.getElementById("username").value.trim();
	const password = document.getElementById("password").value;
	if (!username || !password) {
		errorEl.textContent = "Please enter both username and password.";
		return null;
	}
	return { username, password };
}

async function doLogin() {
	errorEl.textContent = "";
	const fields = getFields();
	if (!fields) return;
	const r = await api("POST", "/api/user/login", { body: fields });
	if (r.status === 204) {
		window.location.href = "/";
	} else if (r.status === 404) {
		errorEl.textContent = "Invalid username or password.";
	} else {
		errorEl.textContent = "Something went wrong. Please try again.";
	}
}

async function doCreate() {
	errorEl.textContent = "";
	const fields = getFields();
	if (!fields) return;
	const r = await api("POST", "/api/user", { body: fields });
	if (r.status === 204) {
		window.location.href = "/";
	} else if (r.status === 409) {
		errorEl.textContent = "That username is already taken.";
	} else {
		errorEl.textContent = "Something went wrong. Please try again.";
	}
}

document.getElementById("password").addEventListener("keydown", (e) => {
	if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
